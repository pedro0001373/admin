    <style>
:root { --primary: #4118a0; --bg-dark: #0F172A; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #F1F5F9; -webkit-tap-highlight-color: transparent; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
.neon-border { box-shadow: 0 0 15px rgba(95, 36, 221, 0.3); border: 1px solid rgba(139, 92, 246, 0.5); }
@keyframes pulse-status {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
}
.pulse-green { animation: pulse-status 2s infinite; }
.modal-slide-up { animation: slideUp 0.3s ease-out forwards; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.category-pill.active { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); border-color: transparent; }
    </style>
</head>
<body class="pb-24">

    <header class="relative h-60 w-full flex items-end pb-6 px-6 overflow-hidden">
        <img src="Design sem nome.jpg" class="absolute inset-0 w-full h-full object-cover opacity-40">
        <div class="absolute inset-0 bg-gradient-to-t from-[#0F172A] to-transparent"></div>
        <div class="relative z-10 w-full">
            <h1 class="text-3xl font-extrabold tracking-tighter italic uppercase mb-4 text-white">EMPÓRIO E TABACARIA JR</h1>
            <div class="flex items-center gap-3 flex-wrap">
                <div class="flex items-center gap-2 bg-black/40 backdrop-blur-md w-fit px-3 py-1.5 rounded-full border border-white/10 text-[10px] font-bold uppercase">
                    <span class="w-2 h-2 bg-green-500 rounded-full pulse-green"></span>
                    <span>Bertioga e Região - Aberto</span>
                </div>
                <div class="flex items-center gap-2 bg-black/40 backdrop-blur-md w-fit px-3 py-1.5 rounded-full border border-white/10 text-[10px] font-bold uppercase text-purple-300">
                    <i class="fa-solid fa-shopping-bag"></i>
                    <span>Pedidos: <span id="total-pedidos-header">0</span></span>
                </div>
            </div>
        </div>
    </header>

   <nav class="sticky top-0 z-40 glass py-4 mb-6">
        <div class="px-6 mb-4">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input id="product-search" type="text" placeholder="Pesquisar produto..." oninput="handleSearchInput(this.value)" class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-sm outline-none focus:border-purple-500 text-white placeholder:text-gray-400">
            </div>
        </div>
        <div class="flex gap-3 overflow-x-auto px-6 no-scrollbar" id="category-list">
            <button onclick="filterCategory('Todos', this)" class="category-pill active whitespace-nowrap px-5 py-2 rounded-xl border border-white/10 text-xs font-bold uppercase transition-all">Todos</button>
        </div>
    </nav>

    <main class="px-6">
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <!-- Modal Produto -->
    <div id="product-modal" class="fixed inset-0 z-[80] bg-black/70 backdrop-blur-sm hidden p-4 flex items-end">
        <div class="absolute inset-0" onclick="closeProductModal()"></div>
        <div class="relative mt-auto max-h-[90vh] overflow-y-auto rounded-[2rem] glass p-6 modal-slide-up w-full">
            <button onclick="closeProductModal()" class="absolute right-4 top-4 text-3xl leading-none text-white">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Barra do Carrinho -->
    <div id="cart-bar" class="fixed bottom-6 left-6 right-6 z-40 hidden">
        <button onclick="openCheckout()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 p-5 rounded-2xl flex justify-between items-center shadow-2xl neon-border transition-transform active:scale-95">
            <div class="flex items-center gap-3">
                <span id="cart-count" class="bg-white text-purple-600 px-2 py-0.5 rounded-md font-bold text-xs">0</span>
                <span class="font-bold uppercase text-xs tracking-widest text-white">Minha Sacola</span>
            </div>
            <span id="cart-total" class="font-bold text-white">R$ 0,00</span>
        </button>
    </div>

    <!-- Modal Checkout -->
    <div id="checkout-modal" class="fixed inset-0 z-[70] glass hidden p-6 overflow-y-auto no-scrollbar">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-black italic uppercase text-white">Fechar Pedido</h2>
                <p class="text-sm text-purple-400 font-bold mt-1">Total de pedidos: <span id="total-pedidos-display">0</span></p>
            </div>
            <button onclick="closeCheckout()" class="text-3xl text-white">&times;</button>
        </div>

        <div id="checkout-items" class="space-y-4 mb-8"></div>

        <div class="space-y-4">
            <input type="text" id="user-name" placeholder="Seu Nome Completo" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 text-white">
            <input type="text" id="user-address" placeholder="Endereço (Rua, nº, Bairro)" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 text-white">

            <select id="user-region" onchange="calculateSummary()" class="w-full bg-[#1E293B] border border-white/10 rounded-xl px-4 py-3 outline-none text-white text-sm">
                <option value="">Selecione a Região de Entrega</option>
                <option value="0">Retirada no Local (R$ 0,00)</option>
                <option value="22">Bertioga Centro (R$ 22,00)</option>
                <option value="18">Rio da Praia / Maitinga / São Rafael (R$ 18,00)</option>
                <option value="18">Riviera (R$ 18,00)</option>
                <option value="10">Vista Linda / Indaiatuba (R$ 10,00)</option>
                <option value="40">Guaratuba / Boraceia (R$ 40,00)</option>
            </select>

            <select id="user-payment" class="w-full bg-[#1E293B] border border-white/10 rounded-xl px-4 py-3 outline-none text-white text-sm">
                <option value="Pix">Pix</option>
                <option value="Cartão">Cartão (Maquininha)</option>
                <option value="Dinheiro">Dinheiro</option>
            </select>

            <div class="bg-white/5 p-5 rounded-2xl space-y-2 text-sm border border-white/5">
                <div class="flex justify-between opacity-60"><span>Subtotal</span> <span id="summary-subtotal">R$ 0,00</span></div>
                <div class="flex justify-between text-lg font-black pt-3 border-t border-white/10">
                    <span>TOTAL</span>
                    <span id="summary-total">R$ 0,00</span>
                </div>
            </div>

            <button onclick="sendWhatsApp()" class="w-full bg-green-500 py-5 rounded-2xl font-black uppercase tracking-tighter flex items-center justify-center gap-3 hover:bg-green-400 transition-colors">
                <i class="fa-brands fa-whatsapp text-2xl"></i> Finalizar no WhatsApp
            </button>
        </div>
    </div>

    : '';

const CATALOG_STORAGE_KEY = 'catalogProducts';
const EMBEDDED_CATALOG_DATA_ID = 'catalog-default-data';

let cachedProducts = null;

function cloneProducts(products) {
    return JSON.parse(JSON.stringify(products || []));
}

function getStoredProducts(key) {
    const stored = localStorage.getItem(key);
    if (!stored) return null;
    try { return JSON.parse(stored); } catch (_) { return null; }
}

function getEmbeddedDefaultProducts() {
    const raw = document.getElementById(EMBEDDED_CATALOG_DATA_ID)?.textContent?.trim();
    if (!raw) return null;
    try { return JSON.parse(raw); } catch (_) { return null; }
}

// Inicia o fetch da API IMEDIATAMENTE — antes mesmo do DOM estar pronto.
// Assim o round-trip ocorre em paralelo com o parsing/rendering da página.
const _apiFetch = (async () => {
    try {
        const r = await fetch(`${API_BASE}/api/produtos`);
        if (r.ok) { const d = await r.json(); if (Array.isArray(d) && d.length) return d; }
    } catch (_) {}
    return null;
})();

function getCatalogProducts() {
    return cachedProducts || [];
}

function loadCategories() {
    const products = getCatalogProducts();
    const categories = [...new Set(products.map(p => p.category).filter(Boolean))].sort();
    const categoryList = document.getElementById('category-list');
    if (!categoryList) return;
    const existing = categoryList.querySelectorAll('.category-pill:not(:first-child)');
    existing.forEach(pill => pill.remove());
    categories.forEach(category => {
        const btn = document.createElement('button');
        btn.className = 'category-pill whitespace-nowrap px-5 py-2 rounded-xl border border-white/10 text-xs font-bold uppercase transition-all';
        btn.textContent = category;
        btn.onclick = function() { filterCategory(category, this); };
        categoryList.appendChild(btn);
    });
}

let cart = [];
let totalPedidos = parseInt(localStorage.getItem('totalPedidos') || '0', 10);
let selectedCategory = 'Todos';
let productSearchTerm = '';

function updateTotalPedidosUI() {
    const displayCheckout = document.getElementById('total-pedidos-display');
    const displayHeader = document.getElementById('total-pedidos-header');
    if (displayCheckout) displayCheckout.textContent = totalPedidos;
    if (displayHeader) displayHeader.textContent = totalPedidos;
}

async function bootstrapCatalog() {
    // 1. Renderiza imediatamente: localStorage > embutido — zero delay perceptível
    const stored   = getStoredProducts(CATALOG_STORAGE_KEY);
    const embedded = getEmbeddedDefaultProducts();
    cachedProducts = (stored?.length ? stored : null) ?? (embedded?.length ? cloneProducts(embedded) : []);
    loadCategories();
    applyFilters();
    updateTotalPedidosUI();

    // 2. Atualiza silenciosamente quando a API responder (fetch já estava rolando)
    const fresh = await _apiFetch;
    if (fresh?.length && fresh !== cachedProducts) {
        cachedProducts = fresh;
        try { localStorage.setItem(CATALOG_STORAGE_KEY, JSON.stringify(fresh)); } catch (_) {}
        loadCategories();
        applyFilters();
    }
}

async function refreshCatalog() {
    try {
        const r = await fetch(`${API_BASE}/api/produtos`);
        if (r.ok) {
            const d = await r.json();
            if (Array.isArray(d) && d.length) {
                cachedProducts = d;
                try { localStorage.setItem(CATALOG_STORAGE_KEY, JSON.stringify(d)); } catch (_) {}
                loadCategories();
                applyFilters();
            }
        }
    } catch (_) {}
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootstrapCatalog);
} else {
    bootstrapCatalog();
}

function renderProducts(items) {
    const grid = document.getElementById('product-grid');
    if (!items || items.length === 0) {
        grid.innerHTML = `
            <div class="col-span-2 text-center text-gray-400 py-12">
                <i class="fa-solid fa-magnifying-glass text-2xl mb-3"></i>
                <p class="text-sm font-bold uppercase">Nenhum produto encontrado</p>
            </div>
        `;
        return;
    }
    grid.innerHTML = items.map(item => {
        const isOut = item.stock === 0;
        const isLow = item.stock > 0 && item.stock <= 3;
        let badge = isOut
            ? '<span class="absolute top-2 right-2 bg-red-600 text-[9px] font-black px-2 py-1 rounded-md uppercase z-10">Esgotado</span>'
            : (isLow ? `<span class="absolute top-2 right-2 bg-orange-500 animate-pulse text-[9px] font-black px-2 py-1 rounded-md uppercase z-10 shadow-lg">AS ULTIMAS ${item.stock}</span>` : '');

        // ✅ BUG CORRIGIDO: IDs string (MongoDB ObjectId) agora são passados entre aspas
        const safeId = String(item.id || item._id || '');
        return `
            <div class="product-card relative glass rounded-[2rem] p-3 flex flex-col ${isOut ? 'opacity-40 grayscale pointer-events-none' : 'active:scale-95 cursor-pointer'}" onclick="openProduct('${safeId}')">
                ${badge}
                <img src="${item.img}" loading="lazy" class="w-full h-36 object-cover rounded-2xl mb-3 shadow-inner" onerror="this.src='https://via.placeholder.com/300x300/1e293b/ffffff?text=JR+TABACARIA'">
                <h3 class="font-bold text-xs mb-1 truncate">${item.name}</h3>
                <p class="text-[9px] text-purple-400 font-black uppercase tracking-widest mb-2">${item.category}</p>
                <p class="font-black text-sm text-white">R$ ${item.price.toFixed(2)}</p>
            </div>
        `;
    }).join('');
}

function filterCategory(cat, btn) {
    document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    selectedCategory = cat;
    applyFilters();
}

let _searchTimer;
function handleSearchInput(value) {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => {
        productSearchTerm = (value || '').toLowerCase().trim();
        applyFilters();
    }, 200);
}

function applyFilters() {
    const products = getCatalogProducts();
    const byCategory = selectedCategory === 'Todos'
        ? products
        : products.filter(i => i.category === selectedCategory);
    const filtered = productSearchTerm
        ? byCategory.filter(i => (i.name || '').toLowerCase().includes(productSearchTerm))
        : byCategory;
    renderProducts(filtered);
}

// ✅ BUG CORRIGIDO: usa comparação de string para suportar ObjectIds do MongoDB
function openProduct(id) {
    const item = getCatalogProducts().find(i => String(i.id || i._id) === String(id));
    if (!item) return;
    const safeId = String(item.id || item._id);
    document.getElementById('modal-content').innerHTML = `
        <img src="${item.img}" class="w-full h-56 object-cover rounded-[2rem] mb-6 neon-border" onerror="this.src='https://via.placeholder.com/600x400/1e293b/ffffff?text=JR+PRODUTO'">
        <h2 class="text-2xl font-black mb-1 italic text-white">${item.name}</h2>
        <p class="text-xs text-purple-400 font-bold mb-4 uppercase tracking-widest">${item.category} • Disponível: ${item.stock} un.</p>
        <p class="text-gray-400 text-sm mb-6 leading-relaxed">${item.desc || 'Produto premium Tabacaria JR.'}</p>
        <textarea id="product-obs" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm mb-6 outline-none focus:border-purple-500 text-white" placeholder="Deseja algum sabor específico ou observação?"></textarea>
        <div class="flex items-center gap-4">
            <div class="flex items-center bg-white/10 rounded-2xl p-1 text-white">
                <button onclick="updateQty(-1, ${item.stock})" class="w-10 h-10 font-bold text-xl">-</button>
                <span id="product-qty" class="w-10 text-center font-black">1</span>
                <button onclick="updateQty(1, ${item.stock})" class="w-10 h-10 font-bold text-xl">+</button>
            </div>
            <button onclick="addToCart('${safeId}')" class="flex-1 bg-purple-600 font-black py-4 rounded-2xl shadow-lg shadow-purple-500/20 uppercase text-white">
                Adicionar • R$ <span id="dynamic-price">${item.price.toFixed(2)}</span>
            </button>
        </div>
    `;
    document.getElementById('product-modal').classList.remove('hidden');
}

function updateQty(val, stock) {
    const el = document.getElementById('product-qty');
    const priceEl = document.getElementById('dynamic-price');
    let current = parseInt(el.innerText);
    let unitPrice = parseFloat(priceEl.innerText) / current;
    if (val > 0 && current >= stock) return alert(`Limite em estoque: ${stock} un.`);
    if (current + val >= 1) {
        current += val;
        el.innerText = current;
        priceEl.innerText = (unitPrice * current).toFixed(2);
    }
}

// ✅ BUG CORRIGIDO: busca por ID com comparação de string
function addToCart(id) {
    const item = getCatalogProducts().find(i => String(i.id || i._id) === String(id));
    if (!item) return;
    const qty = parseInt(document.getElementById('product-qty').innerText);
    const obs = document.getElementById('product-obs').value;
    cart.push({ ...item, qty, obs });
    updateCartUI();
    closeProductModal();
}

function updateCartUI() {
    const cartBar = document.getElementById('cart-bar');
    if (cart.length > 0) {
        cartBar.classList.remove('hidden');
        const total = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
    } else {
        cartBar.classList.add('hidden');
    }
}

function calculateSummary() {
    const sub = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
    const deliveryTax = parseFloat(document.getElementById('user-region').value) || 0;
    const total = sub + deliveryTax;
    document.getElementById('summary-subtotal').innerText = `R$ ${sub.toFixed(2)}`;
    document.getElementById('summary-total').innerHTML = `
        <div class="flex flex-col items-end">
            <span class="text-[10px] opacity-60 font-normal">Entrega: R$ ${deliveryTax.toFixed(2)}</span>
            <span class="text-white">R$ ${total.toFixed(2)}</span>
        </div>
    `;
}

async function sendWhatsApp() {
    const name = document.getElementById('user-name').value.trim();
    const addr = document.getElementById('user-address').value.trim();
    const pay = document.getElementById('user-payment').value;
    const regionSelect = document.getElementById('user-region');

    if (!name || !addr || regionSelect.value === '') {
        return alert('Preencha Nome, Endereço e Região de Entrega!');
    }

    totalPedidos++;
    localStorage.setItem('totalPedidos', totalPedidos.toString());
    updateTotalPedidosUI();

    const regionName = regionSelect.options[regionSelect.selectedIndex].text;
    const deliveryTax = parseFloat(regionSelect.value);
    const subtotal = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
    const totalFinal = subtotal + deliveryTax;

    let msg = `*EMPÓRIO E TABACARIA JR - PEDIDO #${totalPedidos}*\n`;
    msg += `----------------------------\n`;
    msg += `*Cliente:* ${name}\n`;
    msg += `*Endereço:* ${addr}\n`;
    msg += `*Região:* ${regionName}\n`;
    msg += `*Pagamento:* ${pay}\n`;
    msg += `----------------------------\n`;
    msg += `*ITENS:*\n`;
    cart.forEach(i => {
        msg += `• ${i.qty}x ${i.name} - R$ ${(i.price * i.qty).toFixed(2)}`;
        if (i.obs) msg += `\n  _Obs: ${i.obs}_`;
        msg += `\n`;
    });
    msg += `----------------------------\n`;
    msg += `*Subtotal:* R$ ${subtotal.toFixed(2)}\n`;
    msg += `*Taxa de Entrega:* R$ ${deliveryTax.toFixed(2)}\n`;
    msg += `*TOTAL FINAL: R$ ${totalFinal.toFixed(2)}*`;

    const url = `https://wa.me/5513997902909?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');

    // ✅ NOVO: salvar pedido na API
    const pedidoData = {
        cliente: name,
        endereco: addr,
        regiao: regionName,
        pagamento: pay,
        itens: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty, obs: i.obs || '' })),
        subtotal,
        taxaEntrega: deliveryTax,
        total: totalFinal,
        status: 'pendente'
    };
    try {
        await fetch(`${API_BASE}/api/pedidos`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(pedidoData)
        });
    } catch (e) {
        // Offline: salva só no localStorage
        console.log('API indisponível — pedido salvo apenas localmente.');
    }

    // Salvar pedido no localStorage (fallback)
    const vendas = JSON.parse(localStorage.getItem('vendas') || '[]');
    vendas.push({ id: totalPedidos, data: new Date().toISOString(), ...pedidoData });
    localStorage.setItem('vendas', JSON.stringify(vendas));

    // Atualizar estoque no localStorage
    const products = getCatalogProducts();
    cart.forEach(cartItem => {
        const product = products.find(p => String(p.id || p._id) === String(cartItem.id || cartItem._id));
        if (product) {
            product.stock = Math.max(0, (product.stock ?? 0) - cartItem.qty);
        }
    });
    localStorage.setItem('catalogProducts', JSON.stringify(products));
    applyFilters();

    cart = [];
    updateCartUI();
    closeCheckout();
}

function closeProductModal() {
    document.getElementById('product-modal').classList.add('hidden');
}

function openCheckout() {
    document.getElementById('checkout-modal').classList.remove('hidden');
    updateTotalPedidosUI();
    renderCheckoutItems();
    calculateSummary();
}

function closeCheckout() {
    document.getElementById('checkout-modal').classList.add('hidden');
}

function renderCheckoutItems() {
    document.getElementById('checkout-items').innerHTML = cart.map((item, index) => `
        <div class="flex items-center gap-4 bg-white/5 p-4 rounded-xl border border-white/5">
            <img src="${item.img}" class="w-12 h-12 object-cover rounded-lg">
            <div class="flex-1">
                <h4 class="text-xs font-bold text-white">${item.name}</h4>
                <p class="text-[10px] opacity-60">${item.qty}x R$ ${item.price.toFixed(2)}</p>
            </div>
            <button onclick="cart.splice(${index}, 1); updateCartUI(); renderCheckoutItems(); calculateSummary();" class="text-red-400 p-2">
                <i class="fa-solid fa-trash text-sm"></i>
            </button>
        </div>
    `).join('');
}
    // Sincronização em tempo real com o painel admin
    const _syncChannel = new BroadcastChannel('jr_sync');
    _syncChannel.onmessage = (e) => {
        if (e.data?.type === 'produtos_changed') refreshCatalog();
    };
    </script>
</body>
</html>
